aid: trakt
name: Trakt
description: >-
  Trakt is the personal media database for movies and TV. Its API v2 (api.trakt.tv) exposes
  ~150 endpoints across movies, shows, seasons, episodes, people, search, lists, calendars,
  recommendations, comments, notes, scrobble, checkin, and full per-user sync (history,
  watchlist, ratings, collection, favorites, playback progress). Authentication is OAuth 2.0
  via Authorization Code or Device flows. The platform powers the Trakt website, official
  Android/iOS apps, and a large third-party ecosystem of media-center plugins and trackers.
